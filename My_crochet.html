<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My Crochet</title>
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Kranky&display=swap" rel="stylesheet">
        <style type="text/css">
            :root {
                --text: #ffffff;
                --bg-img: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url("Image/BG.png") center top / 100% 100vh no-repeat;
                --shadow: rgba(0,0,0,0.2);
            }

            body {
                margin: 0;
                min-height: 100vh;
                color: var(--text) !important;
            background-color: #e5e5e5 !important;
            animation: fadeIn 0.4s ease-in-out;
            }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                z-index: -1;
                background: var(--bg-img);
            }

            .logo-nav-container {
                position: sticky;
                top: 0;
                width: 100%;
                z-index: 100;
                display: flex;
                justify-content: center;
                align-items: flex-start;
                padding-top: 30px;
                gap: clamp(10px, 2vw, 40px);
                flex-wrap: nowrap;
                min-height: 40vh;
                background: var(--bg-img);
            }

            .logo-nav-item {
                flex: 1 1 0;
                max-width: 150px;
                text-align: center;
                cursor: pointer;
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .logo-nav-item a {
                text-decoration: none;
                color: inherit;
                display: block;
            }

            .logo-nav-item img {
                width: 100%;
                height: 150px;
                object-fit: contain;
                border-radius: 14px;
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .logo-nav-item h3 {
                margin-top: 12px;
                font-size: 35px;
                font-weight: 500;
                letter-spacing: 0.6px;
                font-family: "Kranky", serif;
                font-style: normal;
                color: black;
                white-space: nowrap;
            }

            .logo-nav-item:hover {
                transform: translateY(-10px) scale(1.15);
                z-index: 4;
            }

            .logo-nav-item:hover img {
                box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            }

            .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Creates 3 columns */
            gap: 5%; /* Adjusts the gap between grid items */
            margin-top: 5%;
            margin-right: 15%;
            margin-left: 15%;
        }

        .project img {
            width: 100%; /* Ensures the image covers the container */
            height: 300px;
            transition: transform 0.3s ease; /* Smooth transformation */
            border-radius: 5px; /* Optional: adds rounded corners to images */
            margin-bottom: 15px;
            object-fit: cover;
        }

        .project:hover img {
            transform: scale(1.2); /* Zooms in the image */
        }

        .project h4, .project a {
            color: var(--text);
            text-decoration: none;
        }

        .recent-work-title {
            text-align: center;
            font-family: "Kranky", serif;
            font-size: 50px;
            margin-top: 30px;
            margin-bottom: 50px;
            color: black;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .logo-nav-container {
                gap: 2vw;
                padding: 20px 2vw 0;
                flex-wrap: nowrap;
            }
            .logo-nav-item {
                width: auto;
                flex: 1 1 0;
            }
            .logo-nav-item img {
                height: auto;
                aspect-ratio: 1 / 1;
                border-radius: 8px;
            }
            .logo-nav-item h3 {
                font-size: clamp(9px, 2.5vw, 14px);
                margin-top: 6px;
                white-space: normal;
                line-height: 1.2;
            }
        }

        /* Additional styling for responsiveness */
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr 1fr; /* Adjusts to 2 columns on smaller screens */
            }
        }
        </style>
    </head>

            <div class="logo-nav-item">

                </div>
                <div class="project">

                    </a>
                </div>
                <div class="project">

                <div class="project">

    </body>
