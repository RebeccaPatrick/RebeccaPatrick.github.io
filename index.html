<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Candle in a Box</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kranky&display=swap" rel="stylesheet">

  <style>
    :root {
      --text: #ffffff;
      /* Combine the dark overlay and the background into one variable for seamless matching */
      /* Size is fixed to 100% width and 100vh height to stop zooming and keep the zigzag consistently positioned */
      --bg-img: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url("Image/BG.png") center top / 100% 100vh no-repeat;
    }

    * {
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background-color: #e5e5e5;
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--bg-img);
    }

    .container {
      position: sticky;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 30px;
      gap: clamp(10px, 2vw, 40px);
      flex-wrap: nowrap;
      min-height: 40vh; /* Extends just past the zigzag to act as the navigation bar bounds */
      background: var(--bg-img); /* Perfectly camouflages with the fixed body background */
    }

    /* Category items */
    .item {
      flex: 1 1 0;
      max-width: 150px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .item a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .item img {
      width: 100%;
      height: 150px;
      object-fit: contain;
      border-radius: 14px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .item h3 {
      margin-top: 12px;
      font-size: 35px;
      font-weight: 500;
      letter-spacing: 0.6px;
      font-family: "Kranky", serif;
      font-style: normal;
      color: black;
      white-space: nowrap;
    }

    .item:hover {
      transform: translateY(-10px) scale(1.15);
      z-index: 4;
    }

    .item:hover img {
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    /* Name */
    .name {
      position: absolute;
      bottom: 24px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      letter-spacing: 1.5px;
      opacity: 0.8;
    }

    /* Recent Work Section */
    .recent-work-title {
            text-align: center;
            font-family: "Kranky", serif;
            font-size: 50px;
            margin-top: 30px;
            margin-bottom: 50px;
            color: black;
            position: relative;
            z-index: 1;
            font-weight: 500;
            font-style: normal;
    }

    .gallery {
      max-width: 1000px;
      margin: 0 auto 60px;
      padding: 0 20px;
      column-count: 3;
      column-gap: 5px;
      position: relative;
      z-index: 1;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 5px;
    }

    .gallery-item img {
      width: 100%;
      display: block;
      border: 1px solid white;
    }

    @media (max-width: 768px) {
      .container {
        gap: 2vw;
        padding: 20px 2vw 0;
        flex-wrap: nowrap;
      }

      .item {
        width: auto;
        flex: 1 1 0;
      }

      .item img {
        height: auto;
        aspect-ratio: 1 / 1;
        border-radius: 8px;
      }

      .item h3 {
        font-size: clamp(9px, 2.5vw, 14px);
        margin-top: 6px;
        white-space: normal;
        line-height: 1.2;
      }

      .recent-work-title {
        font-size: 35px;
      }
      .gallery {
        column-count: 2;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Categories -->
    <div class="item">

    </div>

    </div>

    <div class="item">

  </div>
